name: InputsForGA # Always inputs should be manual trigger
on: 
  workflow_dispatch: # its nothing but manual trigger 
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      print_tags:
        description: 'True to print to SDTOUT'
        required: true
        type: boolean
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true
jobs:
  InputsForGA:
    runs-on: ubuntu-latest
    steps:
      - name: Print the input tags to SDTOUT
        run: echo The tags are ${{ inputs.tags }}
      - name: Print the Environment
        run: echo The tags are ${{ inputs.environment }}